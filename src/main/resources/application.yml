spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pricemonitor}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  mail:
    from: "PriceMonitor <onboarding@resend.dev>"
  resend:
    api-key: ${RESEND_API_KEY:noop}
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-that-is-at-least-32-chars-long!}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

ml:
  client-id: ${ML_CLIENT_ID:noop}
  client-secret: ${ML_CLIENT_SECRET:noop}
  refresh-token: ${ML_REFRESH_TOKEN:noop}

mercadolivre:
  api:
    base-url: https://api.mercadolibre.com
    timeout-ms: 5000

resilience4j:
  ratelimiter:
    instances:
      mlScrape:
        limitForPeriod: 20
        limitRefreshPeriod: 1m
        timeoutDuration: 2s
  retry:
    instances:
      mlScrape:
        maxAttempts: 3
        waitDuration: 800ms
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.lang.IllegalStateException

logging:
  level:
    com.paulo.pricemonitor: DEBUG
    io.github.resilience4j: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  resend:
    api-key: ${RESEND_API_KEY}

ml:
  client-id: ${ML_CLIENT_ID}
  client-secret: ${ML_CLIENT_SECRET}
  refresh-token: ${ML_REFRESH_TOKEN}